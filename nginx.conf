# Формат логу: IP, дата/час, метод, URL, статус, User-Agent, Referer
log_format visitors '$remote_addr - [$time_local] "$request" '
                    '$status "$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Лог відвідувачів у файл (монтується через volume)
    access_log /var/log/nginx/visitors.log visitors;
    error_log  /var/log/nginx/error.log warn;

    # Реальний IP за проксі/балансером
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Gzip-стиснення для швидкого завантаження
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Кешування статики
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Безпека: приховуємо версію nginx
    server_tokens off;
}
