services:
  prezentaci:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dom-ip-prezentaci
    ports:
      - "18000:80"
    volumes:
      - ./logs:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
